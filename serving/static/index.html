<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CrisisLens — live hazard map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; font-family: system-ui, sans-serif; }
    #app { display: flex; height: 100%; }
    #map { flex: 1; }
    #panel { width: 360px; padding: 16px; overflow-y: auto; border-left: 1px solid #ddd; }
    h1 { margin: 0; font-size: 20px; }
    .sub { color: #666; margin: 2px 0 14px; font-size: 13px; }
    h2 { font-size: 15px; margin: 18px 0 8px; }
    button { background: #1f6feb; color: #fff; border: 0; padding: 8px 12px;
             border-radius: 6px; cursor: pointer; font-size: 14px; }
    button:hover { background: #1a5fd0; }
    input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px;
            font-size: 14px; margin-bottom: 8px; }
    .row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
    .row label { font-size: 13px; color: #444; white-space: nowrap; }
    .row input { margin: 0; }
    #count { font-size: 13px; color: #444; margin-top: 8px; }
    #answer { background: #f6f8fa; border: 1px solid #e1e4e8; border-radius: 8px;
              padding: 12px; margin-top: 10px; font-size: 14px; line-height: 1.45;
              white-space: pre-wrap; min-height: 20px; }
    #cites { margin-top: 8px; font-size: 12px; }
    #cites a { color: #1f6feb; text-decoration: none; }
    .cite { padding: 4px 0; border-top: 1px solid #eee; }
    .legend { font-size: 12px; line-height: 1.8; margin-top: 8px; }
    .dot { display: inline-block; width: 11px; height: 11px; border-radius: 50%;
           margin-right: 6px; vertical-align: middle; }
    .hint { font-size: 12px; color: #888; margin-top: 4px; }
  </style>
</head>
<body>
  <div id="app">
    <div id="map"></div>
    <div id="panel">
      <h1>🌐 CrisisLens</h1>
      <div class="sub">Live disaster feed + geo-aware assistant</div>

      <div class="row">
        <label>Radius (km)</label>
        <input id="radius" type="number" value="300" min="10" max="5000" />
        <button id="load">Load</button>
      </div>
      <div class="hint">Click anywhere on the map to set your location.</div>
      <div id="count"></div>

      <div class="legend">
        <div><span class="dot" style="background:#d73027"></span>extreme</div>
        <div><span class="dot" style="background:#fc8d59"></span>severe</div>
        <div><span class="dot" style="background:#fee08b"></span>moderate</div>
        <div><span class="dot" style="background:#91bfdb"></span>minor</div>
        <div><span class="dot" style="background:#999"></span>unknown</div>
      </div>

      <h2>Ask about this location</h2>
      <input id="q" placeholder="e.g. is there any flooding near me?" />
      <button id="ask">Ask</button>
      <div id="answer">Set a location, then ask a question.</div>
      <div id="cites"></div>
    </div>
  </div>

  <script>
    const COLORS = { extreme:"#d73027", severe:"#fc8d59", moderate:"#fee08b",
                     minor:"#91bfdb", unknown:"#999" };

    let loc = { lat: 39.5, lon: -98.35 };            // default: US center
    const map = L.map("map").setView([loc.lat, loc.lon], 4);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
      { attribution: "© OpenStreetMap", maxZoom: 18 }).addTo(map);

    const hazardLayer = L.layerGroup().addTo(map);
    let locMarker = L.marker([loc.lat, loc.lon]).addTo(map).bindPopup("Your location");

    const radius = () => Number(document.getElementById("radius").value) || 300;

    async function loadHazards() {
      const r = radius();
      const res = await fetch(`/hazards?lat=${loc.lat}&lon=${loc.lon}&radius_km=${r}&limit=500`);
      const data = await res.json();
      hazardLayer.clearLayers();
      data.hazards.forEach(h => {
        L.circleMarker([h.lat, h.lon], {
          radius: 6, color: "#333", weight: 0.5,
          fillColor: COLORS[h.severity_level] || COLORS.unknown,
          fillOpacity: h.geo_source === "zone_centroid" ? 0.45 : 0.85
        }).bindPopup(
          `<b>${h.title || h.hazard_type}</b><br>` +
          `${h.hazard_type} · <b>${h.severity_level}</b><br>` +
          `${h.place || ""}<br>${h.distance_km} km away` +
          (h.geo_source === "zone_centroid" ? "<br><i>approximate (zone centroid)</i>" : "")
        ).addTo(hazardLayer);
      });
      document.getElementById("count").textContent =
        `${data.count} hazards within ${r} km`;
    }

    async function ask() {
      const q = document.getElementById("q").value.trim();
      if (!q) return;
      const ans = document.getElementById("answer");
      const cites = document.getElementById("cites");
      ans.textContent = "Thinking… (first question takes ~10s)";
      cites.innerHTML = "";
      const res = await fetch(
        `/ask?q=${encodeURIComponent(q)}&lat=${loc.lat}&lon=${loc.lon}&radius_km=${radius()}`);
      const data = await res.json();
      ans.textContent = data.answer;
      cites.innerHTML = data.citations.map(c =>
        `<div class="cite">[${c.n}] ${c.hazard_type} — ${c.place || ""} (${c.distance_km} km) ` +
        `<a href="${c.url}" target="_blank">source</a></div>`).join("");
    }

    map.on("click", e => {
      loc = { lat: +e.latlng.lat.toFixed(4), lon: +e.latlng.lng.toFixed(4) };
      locMarker.setLatLng(e.latlng).bindPopup(`Your location: ${loc.lat}, ${loc.lon}`);
      loadHazards();
    });
    document.getElementById("load").onclick = loadHazards;
    document.getElementById("ask").onclick = ask;
    document.getElementById("q").addEventListener("keydown", e => { if (e.key === "Enter") ask(); });

    loadHazards();  // initial draw
  </script>
</body>
</html>
